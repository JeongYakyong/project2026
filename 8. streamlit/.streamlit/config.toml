# 8단계 데모 테마 — 브리핑 콘솔(라이트 캔버스 + 다크 잉크 사이드바, green #059669)
# 기상개황 지도(weather_map.py)의 디자인 토큰과 동일 계열: ink #0f172a / line #e2e8f0 / green #059669
# ※ "8. streamlit/.streamlit/config.toml" 과 동일 내용 — 실행 위치가 달라도 적용되게 복제.

[theme]
base = "light"
primaryColor = "#059669"
backgroundColor = "#f4f6f9"
secondaryBackgroundColor = "#ffffff"
textColor = "#0f172a"
linkColor = "#047857"
borderColor = "#94a3b8"
baseRadius = "0.6rem"
font = "Pretendard, 'Segoe UI', sans-serif"
headingFont = "Pretendard, 'Segoe UI', sans-serif"
codeFont = "'IBM Plex Mono', monospace"

[theme.sidebar]
backgroundColor = "#0f172a"
secondaryBackgroundColor = "#1e293b"
textColor = "#e2e8f0"
primaryColor = "#34d399"
borderColor = "#1e293b"

[[theme.fontFaces]]
family = "Pretendard"
url = "https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/woff2/Pretendard-Regular.woff2"
weight = 400

