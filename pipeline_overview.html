<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>예측 파이프라인 개요</title>
<!-- 시스템 폰트(맑은 고딕) 사용 — 외부 폰트 불필요 -->
<style>
  :root{
    --paper:#ffffff; --ink:#2d3142; --muted:#4f5d75; --soft:#7a8399;
    --accent:#eb6c36; --rule:rgba(45,49,66,0.12);
  }
  *{box-sizing:border-box}
  body{
    margin:0; background:var(--paper); color:#1a1a1a;
    font-family:'Malgun Gothic','맑은 고딕',sans-serif;
    display:flex; justify-content:center;
    padding:2rem 1rem;
  }
  .wrap{width:100%; max-width:720px}      /* ← 문서 폭. 더 좁히려면 이 값을 줄이세요 */
  .eyebrow{
    font-family:'Malgun Gothic','맑은 고딕',sans-serif; font-size:8px; font-weight:500;
    letter-spacing:0.18em; text-transform:uppercase; color:#1a1a1a;
    margin:0 0 0.4rem;
  }
  h1{
    font-family:'Malgun Gothic','맑은 고딕',sans-serif; font-weight:700; font-size:1.75rem;
    margin:0 0 0.3rem; line-height:1.1;
  }
  .sub{font-size:12px; color:#1a1a1a; margin:0 0 1.25rem; line-height:1.4}
  svg{width:100%; height:auto; display:block}
  footer{
    margin-top:1rem; padding-top:0.6rem; border-top:1px solid var(--rule);
    font-family:'Malgun Gothic','맑은 고딕',sans-serif; font-size:8px; letter-spacing:0.12em;
    color:#1a1a1a; text-transform:uppercase;
  }
</style>
</head>
<body>
<div class="wrap">
  <p class="eyebrow" id="eyebrow"></p>
  <h1 id="title"></h1>
  <p class="sub" id="subtitle"></p>

  <svg id="diagram" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="예측 파이프라인 흐름도"></svg>

  <footer id="footer"></footer>
</div>

<!-- ====================================================================== -->
<!--  ▼▼▼  여기만 고치면 됩니다 — 좌표·화살표는 자동 계산됩니다  ▼▼▼          -->
<!-- ====================================================================== -->
<script>
  // ── 1) 머리말 ──────────────────────────────────────────────
  const META = {
    eyebrow:  "Data → Forecast → Serve",
    title:    "예측 파이프라인 개요",
    subtitle: "제주 · 전국 공통 — 수집부터 프론트엔드까지 한 흐름",
    footer:   "PROJECT.md · 예측 파이프라인 · 2026-06",
  };

  // ── 2) 노드 목록 (위에서부터 순서대로) ─────────────────────
  //   n  = 한글 이름 / id = 영문·기술 식별자(작은 글씨) / type = focal | model | optional
  const NODES = [
    { n:"데이터 수집 · 저장",     id:"공공API → DB저장",   type:"focal"    },
    { n:"전국 전력 수요 예측",             id:"전력수요 예측 → DB저장",     type:"model"    },
    { n:"잔여 순부하 예측",           id:"순부하 = 전력 수요 - 신재생발전 ",            type:"model"    },
    { n:"천연가스 수요 예측",     id:"천연가스수요  ∝ 순부하",          type:"model"    },
    { n:"서비스 대시보드",   id:"예측 결과 시각화 · 조회",   type:"focal"    },
    { n:"AI 에이전트",           id:"분석결과 생성",        type:"optional" },
  ];

  // ── 3) 노드 사이 화살표 라벨 (노드 수 - 1 개) ──────────────
  const FLOW = ["데이터입력", "수요입력", "순부하입력", "결과 출력", "제공"];

  // ── 4) 배치 설정 ──────────────────────────────────────────
  const CFG = {
    cols:  3,    // 열 개수 (2→2열, 3→3열로 즉시 변경)
    nodeW: 192,  // 박스 가로
    nodeH: 64,   // 박스 세로
    gapX:  48,   // 열 간격
    gapY:  64,   // 행 간격
    padX:  24,   // 좌우 여백
    padTop:56,   // 위 여백
  };

  // ── 범례 항목 ─────────────────────────────────────────────
  const LEGEND = [
    { type:"focal",    label:"수집 · 서비스 거점" },
    { type:"model",    label:"예측 모델" },
    { type:"optional", label:"내장 기능" },
  ];
  // ====================================================================== //
  // ▲▲▲  보통은 여기까지만 수정하면 됩니다  ▲▲▲                              //
  // ====================================================================== //


  // ── 렌더링 엔진 (좌표·SVG 자동 생성. 손댈 일 거의 없음) ─────
  const T = {
    paper:'#ffffff', ink:'#2d3142', muted:'#4f5d75', soft:'#7a8399',
    accent:'#eb6c36', accentTint:'rgba(235,108,54,0.08)',
    rule:'rgba(45,49,66,0.12)',
    optFill:'rgba(45,49,66,0.02)', optStroke:'rgba(45,49,66,0.9)',
  };
  const FONT = "'Malgun Gothic','맑은 고딕',sans-serif";   // 시스템 한글 폰트
  const TEXT = '#1a1a1a';                                  // 모든 글자색(검정 통일)
  const STYLE = {
    focal:    { fill:T.accentTint, stroke:T.accent,    num:TEXT, name:TEXT, dash:null  },
    model:    { fill:'#ffffff',    stroke:T.ink,       num:TEXT, name:TEXT, dash:null  },
    optional: { fill:T.optFill,    stroke:T.optStroke, num:TEXT, name:TEXT, dash:'4,3' },
  };

  const place = (i) => {
    const { cols, nodeW, nodeH, gapX, gapY, padX, padTop } = CFG;
    const row = Math.floor(i / cols);
    let col = i % cols;
    if (row % 2 === 1) col = cols - 1 - col;          // 스네이크(뱀) 배치
    const x = padX + col * (nodeW + gapX);
    const y = padTop + row * (nodeH + gapY);
    return { x, y, row, col, cx: x + nodeW/2, cy: y + nodeH/2,
             right: x + nodeW, bottom: y + nodeH };
  };

  const esc = (s) => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;');
  const t = (x,y,s,{size=12,col=TEXT,w=600,fam=FONT,anc='middle',ls=0}={}) =>
    `<text x="${x}" y="${y}" fill="${col}" font-size="${size}" font-weight="${w}" `+
    `font-family="${fam}" text-anchor="${anc}" letter-spacing="${ls}em">${esc(s)}</text>`;
  const mono = (x,y,s,o={}) =>
    t(x,y,s,{size:9, col:TEXT, w:400, fam:FONT, ...o});

  function build() {
    const { nodeW, nodeH, padX, gapX, cols } = CFG;
    const rows  = Math.ceil(NODES.length / cols);
    const vbW   = padX*2 + cols*nodeW + (cols-1)*gapX;
    const lastY = CFG.padTop + rows*nodeH + (rows-1)*CFG.gapY;
    const legendY = lastY + 28;
    const vbH   = legendY + 30;

    let arrows = '', labels = '', boxes = '';

    // 화살표 + 라벨 (박스보다 먼저 그려 뒤로 보냄)
    for (let i = 0; i < NODES.length - 1; i++) {
      const a = place(i), b = place(i+1);
      const dashed = NODES[i+1].type === 'optional';
      const da = dashed ? ' stroke-dasharray="4,3"' : '';
      let x1,y1,x2,y2, mx,my;
      if (a.row === b.row) {                             // 가로 화살표
        const right = b.col > a.col;
        x1 = right ? a.right : a.x;
        x2 = right ? b.x - 4 : b.right + 4;
        y1 = y2 = a.cy;  mx = (x1+x2)/2;  my = a.cy - 12;
      } else {                                           // 세로 화살표(아래로)
        x1 = x2 = a.cx;  y1 = a.bottom;  y2 = b.y - 4;
        mx = a.cx;  my = (y1+y2)/2 - 4;
      }
      arrows += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${T.muted}" `+
                `stroke-width="1"${da} marker-end="url(#arrow)"/>`;
      const lab = FLOW[i]; if (lab) {
        const w = lab.length*9 + 12;
        labels += `<rect x="${mx-w/2}" y="${my-8}" width="${w}" height="16" rx="2" fill="${T.paper}"/>`+
                  mono(mx, my+3, lab, { col:TEXT, size:8, ls:0.06 });
      }
    }

    // 박스
    NODES.forEach((nd, i) => {
      const p = place(i), s = STYLE[nd.type] || STYLE.model;
      const dash = s.dash ? ` stroke-dasharray="${s.dash}"` : '';
      boxes +=
        `<rect x="${p.x}" y="${p.y}" width="${nodeW}" height="${nodeH}" rx="6" fill="${T.paper}"/>`+
        `<rect x="${p.x}" y="${p.y}" width="${nodeW}" height="${nodeH}" rx="6" fill="${s.fill}" stroke="${s.stroke}" stroke-width="1"${dash}/>`+
        `<circle cx="${p.x+16}" cy="${p.y+16}" r="10" fill="${s.fill}" stroke="${s.stroke}" stroke-width="1"/>`+
        t(p.x+16, p.y+19, i+1, { size:9, col:s.num }) +
        t(p.cx, p.y+30, nd.n, { col:s.name }) +
        mono(p.cx, p.y+46, nd.id);
    });

    // 범례 (하단 가로 띠)
    let legend = `<line x1="${padX}" y1="${legendY}" x2="${vbW-padX}" y2="${legendY}" stroke="${T.rule}" stroke-width="0.8"/>`;
    let lx = padX, ly = legendY + 12;
    LEGEND.forEach(item => {
      const s = STYLE[item.type] || STYLE.model;
      const dash = s.dash ? ` stroke-dasharray="3,2"` : '';
      legend += `<rect x="${lx}" y="${ly}" width="12" height="12" rx="2" fill="${s.fill}" stroke="${s.stroke}" stroke-width="1"${dash}/>`+
                mono(lx+16, ly+10, item.label, { col:TEXT, size:8, anc:'start', ls:0.04 });
      lx += item.label.length*9 + 56;
    });

    const svg = document.getElementById('diagram');
    svg.setAttribute('viewBox', `0 0 ${vbW} ${vbH}`);
    svg.innerHTML =
      `<defs><marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">`+
      `<polygon points="0 0, 8 3, 0 6" fill="${T.muted}"/></marker></defs>`+
      `<rect width="100%" height="100%" fill="${T.paper}"/>`+
      arrows + labels + boxes + legend;

    document.getElementById('eyebrow').textContent  = META.eyebrow;
    document.getElementById('title').textContent    = META.title;
    document.getElementById('subtitle').textContent = META.subtitle;
    document.getElementById('footer').textContent   = META.footer;
  }
  build();
</script>
</body>
</html>
