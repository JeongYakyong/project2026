<!DOCTYPE html>
<html lang="ko">
<head>

  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&family=Noto+Sans+KR:wght@400;500;600&family=Noto+Serif+KR:wght@400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --color-paper:   #f5f5f5;

      --font-mono:     'Geist Mono', ui-monospace, monospace;
    }
    body {
      font-family: var(--font-sans);
      background: var(--color-paper);
      color: var(--color-ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2.5rem 2rem;
    }
    .frame { max-width: 480px; width: 100%; }
    .eyebrow {
      font-family: var(--font-mono);
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--color-muted);
      margin-bottom: 0.45rem;
    }
    h1 {
      font-family: var(--font-serif);
      font-size: 1.85rem;
      font-weight: 400;
      letter-spacing: -0.01em;
      line-height: 1.15;
      color: var(--color-ink);
      margin-bottom: 0.4rem;
    }
    .subtitle {
      font-size: 0.84rem;
      line-height: 1.45;
      color: var(--color-muted);
      margin-bottom: 1.2rem;
    }
    svg { width: 100%; min-width: 320px; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">2. JEJU_DEMAND_FORECASTER · 구조도</p>
    <h1>제주 수요 예측 파이프라인</h1>
    <p class="subtitle">DB에서 필요한 데이터를 뽑아 모델에 넣고, 예측 결과를 같은 DB에 다시 저장한다. 오른쪽 박스는 모델 종류와 입력 피처를 정리한 것이다.</p>

      </defs>

      <rect width="100%" height="100%" fill="#f5f5f5"/>

      <!-- ── Arrows first (behind boxes) ───────────────────────────── -->
      <line x1="110" y1="100" x2="110" y2="152" stroke="#4f5d75" stroke-width="1.4" marker-end="url(#arrow)"/>

      <!-- ── Arrow labels (beside the arrow) ───────────────────────── -->

      <text x="122" y="126" fill="#4f5d75" font-size="9" font-family="'Noto Sans KR', sans-serif">필요 데이터 추출</text>

      <rect x="118" y="246" width="52" height="14" rx="2" fill="#f5f5f5"/>

      <text x="110" y="204" fill="#7a8399" font-size="9" font-family="'Noto Sans KR',sans-serif" text-anchor="middle">3지점 평균 · 결측 보간</text>

      <rect x="20" y="408" width="180" height="56" rx="6" fill="#f5f5f5"/>

      <text x="110" y="456" fill="#7a8399" font-size="8.5" font-family="'Geist Mono', monospace" text-anchor="middle">jeju_est_demand_new / _lh</text>

      <rect x="240" y="150" width="180" height="100" rx="6" fill="rgba(45,49,66,0.02)" stroke="rgba(45,49,66,0.22)" stroke-width="1" stroke-dasharray="4,3"/>

      <text x="252" y="206" fill="#4f5d75" font-size="8.5" font-family="'Noto Sans KR',sans-serif">· 과거 수요 lag · 이동평균</text>

      <text x="252" y="238" fill="#4f5d75" font-size="8.5" font-family="'Noto Sans KR',sans-serif">· 구름 · BTM 용량 (장지평)</text>

      <rect x="240" y="294" width="180" height="76" rx="6" fill="rgba(45,49,66,0.02)" stroke="rgba(45,49,66,0.22)" stroke-width="1" stroke-dasharray="4,3"/>

      <text x="252" y="334" fill="#4f5d75" font-size="8.5" font-family="'Noto Sans KR',sans-serif">· PatchTST + LightGBM — D+1 24h</text>
      <text x="252" y="350" fill="#4f5d75" font-size="8.5" font-family="'Noto Sans KR',sans-serif">· LightGBM 직접 다지평 — D+1~D+7</text>
      <text x="252" y="364" fill="#7a8399" font-size="8" font-family="'Noto Sans KR',sans-serif">딥러닝 시계열 + 부스팅 트리</text>

      <!-- ── Legend (2-column, compact) ────────────────────────────── -->
      <line x1="20" y1="500" x2="420" y2="500" stroke="rgba(45,49,66,0.10)" stroke-width="0.8"/>
      <text x="20" y="516" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.18em">LEGEND</text>

      <rect x="20" y="528" width="13" height="9" rx="2" fill="rgba(45,49,66,0.05)" stroke="#4f5d75" stroke-width="1"/>

      <rect x="228" y="548" width="13" height="9" rx="2" fill="rgba(45,49,66,0.02)" stroke="rgba(45,49,66,0.22)" stroke-width="1" stroke-dasharray="3,2"/>
      <text x="248" y="556" fill="#4f5d75" font-size="8.5" font-family="'Noto Sans KR',sans-serif">참고 (모델 · 피처)</text>

      <line x1="228" y1="574" x2="248" y2="574" stroke="rgba(45,49,66,0.30)" stroke-width="1" stroke-dasharray="1,3"/>
      <text x="254" y="577" fill="#4f5d75" font-size="8.5" font-family="'Noto Sans KR',sans-serif">상세 연결</text>
