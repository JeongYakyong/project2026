<!DOCTYPE html>

  <style>

    <p class="eyebrow">1. DATA_FETCHER_AND_DB · 구조도</p>
    <h1>데이터 수집 구조</h1>

      <line x1="324" y1="100" x2="244" y2="152" stroke="#2e5aa8" stroke-width="1.2" marker-end="url(#arrow-link)"/>

      <text x="258" y="433" fill="#7a8399" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">OPEN</text>
      <text x="324" y="450" fill="#2d3142" font-size="11.5" font-weight="600" font-family="'Geist','Noto Sans KR',sans-serif" text-anchor="middle">한국가스공사 공공데이터</text>
      <text x="324" y="467" fill="#7a8399" font-size="9" font-family="'Noto Sans KR',sans-serif" text-anchor="middle">API 아님 · 주기적 갱신</text>
