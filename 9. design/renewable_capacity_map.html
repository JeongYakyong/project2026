<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>신재생 발전 지도 — 권역 choropleth × 기상</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.3/dist/leaflet.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.3/dist/leaflet.js"></script>
<style>
  :root{ --ink:#0f172a; --sub:#475569; --line:#e2e8f0; --panel:#ffffff;
    --solar:#e11d48; --solar-soft:#fb7185; --wind:#1d4ed8; --wind-soft:#60a5fa; --green:#059669; --bg:#eef2f6; }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%;width:100%;
    font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    color:var(--ink);background:var(--bg);}
  #map{position:absolute;inset:0;}
  .leaflet-container{font-family:inherit;background:#e8edf2;}

  .panel{position:fixed;top:16px;left:16px;z-index:1000;width:300px;background:var(--panel);
    border:1px solid var(--line);border-radius:14px;box-shadow:0 8px 28px rgba(15,23,42,.10);overflow:hidden;}
  .panel__head{padding:14px 16px 12px;border-bottom:1px solid var(--line);}
  .panel__eyebrow{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--sub);}
  .panel__title{font-size:17px;font-weight:800;margin:3px 0 0;line-height:1.25;}
  .panel__body{padding:13px 16px 15px;}

  .toggle{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:9px;cursor:pointer;user-select:none;transition:background .12s;}
  .toggle:hover{background:#f8fafc;}
  .toggle input{position:absolute;opacity:0;width:0;height:0;}
  .swatch{width:15px;height:15px;border-radius:5px;flex:none;border:2px solid #cbd5e1;background:#fff;display:grid;place-items:center;transition:.12s;}
  .toggle[data-k="solar"] input:checked + .swatch{background:var(--solar);border-color:var(--solar);}
  .toggle[data-k="wind"]  input:checked + .swatch{background:var(--wind); border-color:var(--wind);}
  .swatch svg{opacity:0;width:9px;height:9px;}
  .toggle input:checked + .swatch svg{opacity:1;}
  .toggle .lab{font-size:14px;font-weight:600;flex:1;}
  .toggle .dot{width:10px;height:10px;border-radius:50%;}
  .toggle[data-k="solar"] .dot{background:var(--solar);}
  .toggle[data-k="wind"]  .dot{background:var(--wind);}

  .divider{height:1px;background:var(--line);margin:13px 0 11px;}
  .sec-label{font-size:11px;font-weight:700;letter-spacing:.04em;color:var(--sub);text-transform:uppercase;
    margin-bottom:9px;display:flex;justify-content:space-between;align-items:center;}
  .sec-label .conf{font-weight:600;letter-spacing:0;text-transform:none;}

  .dates{display:flex;gap:5px;flex-wrap:wrap;}
  .dchip{flex:0 0 auto;min-width:40px;text-align:center;padding:7px 6px 6px;border-radius:9px;
    border:1px solid var(--line);background:#fff;cursor:pointer;transition:.12s;line-height:1.1;}
  .dchip:hover{border-color:#cbd5e1;}
  .dchip.active{background:var(--ink);border-color:var(--ink);}
  .dchip .dd{font-size:12px;font-weight:800;color:var(--ink);}
  .dchip.active .dd{color:#fff;}
  .dchip .ic{font-size:13px;display:block;margin-top:2px;}
  .dchip.gap{margin-left:9px;position:relative;}
  .dchip.gap:before{content:"";position:absolute;left:-7px;top:6px;bottom:6px;width:1px;background:var(--line);}
  .dchip .cdot{width:5px;height:5px;border-radius:50%;margin:3px auto 0;}

  .verdict{margin-top:13px;padding:11px 12px;border-radius:10px;background:#f8fafc;border:1px solid var(--line);}
  .verdict__top{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:700;color:var(--sub);}
  .verdict__bar{display:flex;height:8px;border-radius:5px;overflow:hidden;margin:8px 0 9px;background:#e2e8f0;}
  .verdict__bar > span{display:block;height:100%;transition:width .3s;}
  .verdict__msg{font-size:13px;line-height:1.45;color:var(--ink);}
  .verdict__msg b{font-weight:800;}

  .legend{margin-top:12px;font-size:11.5px;color:var(--sub);line-height:1.6;}
  .legend b{color:var(--ink);}

  .source{position:fixed;bottom:14px;left:16px;z-index:1000;max-width:316px;background:var(--panel);
    border:1px solid var(--line);border-radius:11px;padding:10px 13px;box-shadow:0 4px 16px rgba(15,23,42,.08);
    font-size:11px;color:var(--sub);line-height:1.55;}
  .source b{color:var(--ink);}
  .source .warn{color:var(--solar);font-weight:700;}

  .wxwrap{background:none!important;border:none!important;}
  .wx{transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:1px;pointer-events:none;}
  .wx .emo{font-size:23px;line-height:1;filter:drop-shadow(0 1px 3px rgba(0,0,0,.3));}
  .wx .nm{font-size:11px;font-weight:800;color:#0f172a;background:rgba(255,255,255,.85);
    padding:1px 6px;border-radius:7px;white-space:nowrap;box-shadow:0 1px 3px rgba(0,0,0,.14);}

  .leaflet-tooltip.rt{background:#0f172a;border:none;border-radius:10px;box-shadow:0 6px 20px rgba(0,0,0,.25);padding:0;color:#fff;font-family:inherit;}
  .leaflet-tooltip.rt:before{display:none;}
  .tip{padding:11px 13px;min-width:200px;}
  .tip__name{font-size:14px;font-weight:800;}
  .tip__mem{font-size:10.5px;color:#94a3b8;margin:1px 0 7px;}
  .tip__wx{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;margin-bottom:7px;
    padding-bottom:7px;border-bottom:1px solid rgba(255,255,255,.14);}
  .tip__wx .ws{margin-left:auto;color:#94a3b8;font-weight:500;font-size:11px;}
  .tip__row{display:flex;align-items:center;justify-content:space-between;gap:14px;font-size:12px;margin:4px 0;}
  .tip__row .k{display:flex;align-items:center;gap:6px;color:#cbd5e1;}
  .tip__row .k i{width:8px;height:8px;border-radius:50%;display:inline-block;}
  .tip__row .v{font-weight:700;font-variant-numeric:tabular-nums;}
  .tip__row .v small{font-weight:500;color:#94a3b8;margin-left:3px;}
  .tip__act{margin-top:7px;padding-top:7px;border-top:1px solid rgba(255,255,255,.14);}
  .tip__act .lvl{font-size:11px;color:#94a3b8;}
  .mini{height:5px;border-radius:3px;background:rgba(255,255,255,.16);margin-top:3px;overflow:hidden;}
  .mini > span{display:block;height:100%;}

  @media (max-width:560px){ .panel{width:calc(100vw - 32px);} .source{display:none;} }
</style>
</head>
<body>
<div id="map"></div>

<div class="panel">
  <div class="panel__head">
    <div class="panel__eyebrow">신재생 발전 · 8권역</div>
    <h1 class="panel__title">용량 × 기상 활성도</h1>
  </div>
  <div class="panel__body">
    <label class="toggle" data-k="solar">
      <input type="checkbox" id="ck-solar" checked />
      <span class="swatch"><svg viewBox="0 0 10 10"><path d="M1 5l2.5 2.5L9 2" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
      <span class="lab">태양광 발전</span><span class="dot"></span>
    </label>
    <label class="toggle" data-k="wind">
      <input type="checkbox" id="ck-wind" checked />
      <span class="swatch"><svg viewBox="0 0 10 10"><path d="M1 5l2.5 2.5L9 2" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
      <span class="lab">풍력 발전</span><span class="dot"></span>
    </label>

    <div class="divider"></div>
    <div class="sec-label"><span>예보 날짜</span><span class="conf" id="conf-lab">신뢰도 높음</span></div>
    <div class="dates" id="dates"></div>

    <div class="verdict">
      <div class="verdict__top"><span id="v-ico">☀️</span><span id="v-name">—</span></div>
      <div class="verdict__bar"><span id="v-strength" style="background:var(--green)"></span></div>
      <div class="verdict__msg" id="v-msg">—</div>
    </div>

    <div class="legend">
      <b>면 색(초록)</b> = 신재생 발전 강도(진할수록 강함) · <b>이모지</b> = 하늘상태<br>
      체크된 발전원만 강도에 반영 · 커서를 올리면 권역 카드
    </div>
  </div>
</div>

<div class="source">
  <b>용량(추정):</b> 2026.04 전국총량(태양광 32,782MW·풍력 3,067MW) × 2024 지역비율, 8권역 집계.
  <b>기상:</b> 육지 5(대관령·원주·서산·포항·영광)+제주 1 관측소.
  <span class="warn">실제 예보 연동 시 상단 데이터만 교체.</span>
</div>

const SOLAR_BINS = [ /* [최소 일사비율, 활성도%, 등급] */
  [0.80, 95, "매우 좋음"], [0.60, 75, "좋음"], [0.40, 52, "보통"],
  [0.20, 30, "낮음"],      [0.00, 10, "매우 낮음"],

const WIND_BINS = [ /* [최소, 최대 풍속(m/s), 활성도%, 등급] */
  [0,3, 0,"정지"], [3,6, 30,"약함"], [6,9, 65,"양호"],
  [9,13, 95,"최적"], [13,25, 85,"강풍"], [25,999, 0,"차단"],
];
function solarAct(w){
  for (const [mn,pct,lab] of SOLAR_BINS){
    if (w.ghi >= mn){ return w.pty ? {pct:10, lab:"강수"} : {pct, lab}; }
  }
  return {pct:10, lab:"매우 낮음"};
}
function windAct(w){
  for (const [lo,hi,pct,lab] of WIND_BINS){ if (w.wind>=lo && w.wind<hi) return {pct,lab}; }
  return {pct:0, lab:"차단"};
}
/* 하늘상태(전운량+강수, 기상청 기준) */
function sky(w){
  if (w.pty===1) return {emo:"🌧️", t:"비"};
  if (w.pty===2) return {emo:"🌨️", t:"눈"};
  if (w.cloud>=9) return {emo:"☁️", t:"흐림"};
  if (w.cloud>=6) return {emo:"⛅", t:"구름많음"};
  return {emo:"☀️", t:"맑음"};
}
function wxOf(z, dp){
  const s = STATIONS[z.st];
  return { cloud: Math.max(0,Math.min(10, dp.cloud + s.cloudAdj)), pty: dp.pty,
           ghi: Math.max(0,Math.min(1, dp.ghi * s.ghiMul)), wind: dp.wind * s.windMul };
}

const emoji = {};
function makeIcon(sk, name){
  return L.divIcon({className:"wxwrap", iconSize:[0,0], iconAnchor:[0,0],
    html:`<div class="wx"><span class="emo">${sk.emo}</span><span class="nm">${name}</span></div>`});
}
Object.keys(ZONES).forEach(name=>{
  const z=ZONES[name];
  emoji[name] = L.marker([z.lat,z.lon], {icon:makeIcon({emo:"☀️"}, name), interactive:false}).addTo(labelLayer);
});

/* 날짜 칩 */
let current = DATEPAT[0];
const dbox = document.getElementById("dates");
DATEPAT.forEach((h,i)=>{
  const ce = sky(wxOf({st:"114"}, h));
  const b = document.createElement("div");
  b.className = "dchip" + (i===0?" active":"") + (h.d===12?" gap":"");
  b.innerHTML = `<span class="dd">D+${h.d}</span><span class="ic">${ce.emo}</span>`+
                `<span class="cdot" style="background:${CONF[h.conf].c}"></span>`;
  b.onclick = ()=>{ current=h;
    document.querySelectorAll(".dchip").forEach(x=>x.classList.remove("active"));
    b.classList.add("active"); render(); };
  dbox.appendChild(b);
});

function tipHTML(name, z, w, sa, wa, sk){
  const st = STATIONS[z.st];
  return `<div class="tip"><div class="tip__name">${name} <span style="font-size:10px;color:#64748b">D+${current.d}</span></div>`+
    `<div class="tip__mem">${z.mem}</div>`+
    `<div class="tip__wx">${sk.emo} ${sk.t} · 풍속 ${w.wind.toFixed(1)}m/s<span class="ws">기상: ${st.name}</span></div>`+
    `<div class="tip__row"><span class="k"><i style="background:var(--solar)"></i>태양광 용량</span><span class="v">${z.solar.toLocaleString()} MW</span></div>`+
    `<div class="tip__row"><span class="k"><i style="background:var(--wind)"></i>풍력 용량</span><span class="v">${z.wind.toLocaleString()} MW</span></div>`+
    `<div class="tip__act">`+
      `<div class="tip__row"><span class="lvl">☀️ 태양광 활성도</span><span class="v">${sa.pct}%<small>${sa.lab}</small></span></div>`+
      `<div class="mini"><span style="width:${sa.pct}%;background:var(--solar-soft)"></span></div>`+
      `<div class="tip__row" style="margin-top:6px"><span class="lvl">🌀 풍력 활성도</span><span class="v">${wa.pct}%<small>${wa.lab}</small></span></div>`+
      `<div class="mini"><span style="width:${wa.pct}%;background:var(--wind-soft)"></span></div>`+
    `</div></div>`;
}

function render(){
  const ckS=document.getElementById("ck-solar").checked, ckW=document.getElementById("ck-wind").checked;
  const Z={}; let refCap=0;
  Object.keys(ZONES).forEach(name=>{
    const z=ZONES[name], w=wxOf(z,current);
    const sa=solarAct(w), wa=windAct(w), sk=sky(w);
    Z[name]={z,w,sa,wa,sk,gen:genOf(z,sa,wa,ckS,ckW)};
    refCap = Math.max(refCap, activeCap(z,ckS,ckW));
    emoji[name].setIcon(makeIcon(sk, name));
  });
  const maxGen = refCap*0.95 || 1;           // 기준: 최대용량 권역의 최상 조건
  let sumScore=0, top=[];
  Object.keys(Z).forEach(name=>{
    const d=Z[name]; d.score=Math.min(1, d.gen/maxGen); sumScore+=d.score;
    top.push([name, d.gen]);
  });
  top.sort((a,b)=>b[1]-a[1]);
  gj.getLayers().forEach(lyr=>{
    const d=Z[lyr._zone]; if(!d) return;
    const op = (refCap===0) ? 0.05 : OP_MIN + (OP_MAX-OP_MIN)*d.score;
    lyr.setStyle({fillColor:GREEN, fillOpacity:op, color:"#cbd5e1", weight:0.7});
    lyr.setTooltipContent(tipHTML(lyr._zone, d.z, d.w, d.sa, d.wa, d.sk));
  });
  const avg=Math.round(sumScore/Object.keys(Z).length*100);
  const repC=sky(wxOf({st:"114"}, current));
  document.getElementById("v-ico").textContent=repC.emo;
  document.getElementById("v-name").textContent=`D+${current.d} · 전국 대체로 ${repC.t}`;
  document.getElementById("v-strength").style.width=Math.min(100, avg*1.4)+"%";
  const cf=CONF[current.conf], cl=document.getElementById("conf-lab"); cl.textContent=cf.t; cl.style.color=cf.c;
  document.getElementById("v-msg").innerHTML=
    `전국 신재생 가동 강도 <b>${avg}%</b>. 가장 활발: <b>${top[0][0]}</b> · <b>${top[1][0]}</b>.`;
}

document.getElementById("ck-solar").onchange=render;
document.getElementById("ck-wind").onchange=render;
render();
</script>
</body>
</html>
